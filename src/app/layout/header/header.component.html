<header class="header" [class.is-scrolled]="scrolled">
  <div class="header-container">
    <!-- Logo -->
    <div class="logo">
      <a href="#home" fragment="home" aria-label="Início — Proauto Kimium">
        <img src="logo-proauto.png" alt="Proauto Kimium">
      </a>
    </div>

    <!-- Navegação (desktop) -->
    <nav class="nav-desktop">
      <ul>
        <li><a href="#home" fragment="home">Início</a></li>
        <li><a routerLink="produtos">Produtos</a></li>
        <li><a href="#services">Serviços</a></li>
        <li><a href="#about-us">Sobre nós</a></li>
        <li><a routerLink="trabalhe-conosco">Trabalhe Conosco</a></li>
        <li><a href="#contact">Contato</a></li>
      </ul>
    </nav>

    <!-- Ação à direita (desktop) -->
    <div class="actions">
      <a routerLink="login" class="btn-login" title="Entrar">
        <i class="pi pi-sign-in"></i>
        <span>Entrar</span>
      </a>
    </div>
  </div>
</header>

<!-- Bottom navigation — Liquid Glass (mobile) -->
<nav class="bottom-nav" [class.is-condensed]="navCondensed" aria-label="Navegação principal">
  <span class="bottom-nav__indicator" [style.transform]="'translateX(' + activeIndex * 100 + '%)'" aria-hidden="true"></span>

  <a class="bottom-nav__item" [class.is-active]="activeIndex === 0 && !menuAberto" (click)="setActive(0)" href="#home" fragment="home">
    <i class="pi pi-home"></i>
    <span>Início</span>
  </a>
  <a class="bottom-nav__item" [class.is-active]="activeIndex === 1 && !menuAberto" (click)="setActive(1)" routerLink="produtos">
    <i class="pi pi-box"></i>
    <span>Produtos</span>
  </a>
  <a class="bottom-nav__item" [class.is-active]="activeIndex === 2 && !menuAberto" (click)="setActive(2)" href="#services">
    <i class="pi pi-briefcase"></i>
    <span>Serviços</span>
  </a>
  <a class="bottom-nav__item" [class.is-active]="activeIndex === 3 && !menuAberto" (click)="setActive(3)" href="#contact">
    <i class="pi pi-envelope"></i>
    <span>Contato</span>
  </a>
  <button
    class="bottom-nav__item"
    type="button"
    [class.is-active]="menuAberto"
    (click)="toggleMenu()"
    [attr.aria-expanded]="menuAberto"
    aria-controls="menu-drawer"
    aria-label="Abrir menu">
    <i class="pi pi-bars"></i>
    <span>Menu</span>
  </button>
</nav>

<!-- Overlay do drawer (mobile) -->
<div class="menu-overlay" [class.active]="menuAberto" (click)="fecharMenuMobile()" aria-hidden="true"></div>

<!-- Drawer lateral — Liquid Glass (mobile) -->
<aside id="menu-drawer" class="drawer" [class.active]="menuAberto">
  <div class="drawer-head">
    <img class="drawer-logo" src="logo-proauto.png" alt="Proauto Kimium">
    <button class="drawer-close" type="button" (click)="fecharMenuMobile()" aria-label="Fechar menu">
      <i class="pi pi-times"></i>
    </button>
  </div>

  <ul class="drawer-links">
    <li><a href="#home" fragment="home" (click)="fecharMenuMobile()">Início</a></li>
    <li><a routerLink="produtos" (click)="fecharMenuMobile()">Produtos</a></li>
    <li><a href="#services" (click)="fecharMenuMobile()">Serviços</a></li>
    <li><a href="#about-us" (click)="fecharMenuMobile()">Sobre nós</a></li>
    <li><a routerLink="trabalhe-conosco" (click)="fecharMenuMobile()">Trabalhe Conosco</a></li>
    <li><a href="#contact" (click)="fecharMenuMobile()">Contato</a></li>
  </ul>

  <div class="drawer-auth">
    <a routerLink="login" class="btn-login" (click)="fecharMenuMobile()">
      <i class="pi pi-sign-in"></i>
      <span>Entrar</span>
    </a>
  </div>
</aside>
