<p-toolbar>
  <div class="p-toolbar-group-start">
    <p-button icon="pi pi-refresh" class="mr-2" (click)="loadContacts()"></p-button>
  </div>
</p-toolbar>

<div class="card">
  <p-table
    #dt1
    [value]="contacts"
    dataKey="email"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[5,10,20]"
    [loading]="loading"
    [responsiveLayout]="'scroll'"
    [globalFilterFields]="['name','email','businessName']"
    [rowHover]="true"
    [expandedRowKeys]="expandedRows"
    (onRowExpand)="onRowExpand($event)"
    (onRowCollapse)="onRowCollapse($event)">

    <!-- Toolbar do Table -->
    <ng-template pTemplate="caption">
      <div class="flex flex-wrap justify-end gap-2">
        <p-button label="Expand All" icon="pi pi-plus" text (click)="expandAll()"></p-button>
        <p-button label="Collapse All" icon="pi pi-minus" text (click)="collapseAll()"></p-button>
      </div>
    </ng-template>

    <!-- Cabeçalho -->
    <ng-template pTemplate="header">
      <tr>
        <th style="width:5rem"></th>
        <th>Nome</th>
        <th>Email</th>
        <th>Tipo Contato</th>
        <th>Empresa</th>
        <th>Data contato</th>
      </tr>
    </ng-template>

    <!-- Corpo -->
    <ng-template pTemplate="body" let-contact let-expanded="expanded">
      <tr>
        <td>
          <p-button
            type="button"
            pRipple
            [pRowToggler]="contact"
            [icon]="expanded ? 'pi pi-chevron-down' : 'pi pi-chevron-right'"
            [text]="true"
            severity="secondary"
            [rounded]="true">
          </p-button>
        </td>
        <td>{{ contact.name }}</td>
        <td>{{ contact.email }}</td>
        <td>{{ contact.contactType }}</td>
        <td>{{ contact.businessName }}</td>
        <td>{{ contact.contactDate | date:'dd/MM/yyyy' }}</td>
      </tr>
    </ng-template>

    <!-- Linha expandida -->
    <ng-template pTemplate="expandedrow" let-contact>
      <tr>
        <td colspan="6">
          <strong>Mensagem:</strong>
          <p>{{ contact.message }}</p>
        </td>
      </tr>
    </ng-template>

    <!-- Mensagem de vazio -->
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6">Nenhum contato encontrado.</td>
      </tr>
    </ng-template>
  </p-table>
</div>
