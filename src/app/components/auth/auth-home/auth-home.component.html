<div class="home-container">

  <section class="welcome-section">
    <div class="welcome-content">
      <div>
        <h2>Olá, bem-vindo de volta! <span class="wave-emoji">👋</span></h2>
        <p class="welcome-date">{{ currentDate | date:'EEEE, dd MMMM yyyy':'':'pt-BR' }}</p>
      </div>
    </div>
  </section>

  <section class="apps-section">
    <h3 class="section-title">
      <i class="pi pi-external-link"></i>
      Apps Externos
    </h3>
    <div class="apps-grid">

      <a href="https://cloud.proautokimium.com.br/" target="_blank" class="app-card app-card--nextcloud">
        <div class="app-card__glow"></div>
        <div class="app-card__icon">
          <i class="pi pi-cloud"></i>
        </div>
        <div class="app-card__info">
          <span class="app-card__name">NextCloud</span>
          <span class="app-card__desc">Armazenamento & Arquivos</span>
        </div>
        <i class="pi pi-arrow-up-right app-card__arrow"></i>
      </a>

      <a href="https://n8n.proautokimium.com.br/" target="_blank" class="app-card app-card--n8n">
        <div class="app-card__glow"></div>
        <div class="app-card__icon">
          <i class="pi pi-sitemap"></i>
        </div>
        <div class="app-card__info">
          <span class="app-card__name">N8N</span>
          <span class="app-card__desc">Automação de Fluxos</span>
        </div>
        <i class="pi pi-arrow-up-right app-card__arrow"></i>
      </a>

      <a href="https://pdf.proautokimium.com.br/" target="_blank" class="app-card app-card--pdf">
        <div class="app-card__glow"></div>
        <div class="app-card__icon">
          <i class="pi pi-file-pdf"></i>

          <span class="app-card__desc">Gestão de Documentos</span>
        </div>
        <i class="pi pi-arrow-up-right app-card__arrow"></i>
      </a>

      <a href="https://jenkins.proautokimium.com.br/" target="_blank" class="app-card app-card--jenkins">
        <div class="app-card__glow"></div>
        <div class="app-card__icon">
          <i class="pi pi-cog"></i>
        </div>
        <div class="app-card__info">
          <span class="app-card__name">Jenkins</span>
          <span class="app-card__desc">CI/CD & Deploy</span>
        </div>

      </a>

      <a href="https://api.proautokimium.com/swagger-ui/index.html" target="_blank" class="app-card app-card--api">
        <div class="app-card__glow"></div>
        <div class="app-card__icon">
          <i class="pi pi-code"></i>
        </div>
        <div class="app-card__info">
          <span class="app-card__name">API</span>
          <span class="app-card__desc">Documentação Swagger</span>
        </div>
        <i class="pi pi-arrow-up-right app-card__arrow"></i>
      </a>

      <a href="https://infra.proautokimium.com.br/" target="_blank" class="app-card app-card--glpi">
        <div class="app-card__glow"></div>
        <div class="app-card__icon">
          <i class="pi pi-ticket"></i>
        </div>
        <div class="app-card__info">
          <span class="app-card__name">GLPI</span>
          <span class="app-card__desc">Chamados & Suporte</span>
        </div>
        <i class="pi pi-arrow-up-right app-card__arrow"></i>
      </a>
