<p-toast></p-toast>

<!-- TOPBAR -->
<div class="ac-topbar">
  <div class="ac-topbar-left">
    <div class="ac-topbar-icon">
      <i class="pi pi-users"></i>
    </div>
    <div>
      <h1 class="ac-topbar-title">Centro Administrativo</h1>
      <span class="ac-topbar-sub">Gerencie usuários e permissões</span>
    </div>
  </div>
  <div class="ac-topbar-right">
    <pk-button pkType="new" pkSize="sm" pkLabel="Novo usuário" (clicked)="openCreateDialog()"/>
    <pk-button pkType="token" pkSize="sm" [pkLoading]="loading" (clicked)="generateAccessTokens()"/>
    <pk-button pkType="refresh" pkSize="sm" pkLabel="Carregar" [pkLoading]="loading" (clicked)="loadUsers()"/>
  </div>
</div>

<!-- CONTEÚDO -->
<div class="ac-content">
  <pk-table
    [data]="users"
    [loading]="isLoadingUsers"
    totalLabel="usuários"
    [filterFields]="['login']"
    searchPlaceholder="Buscar usuário…"
    emptyIcon="pi pi-users"
    emptyTitle="Nenhum usuário encontrado"
    emptySubtitle="Cadastre o primeiro usuário no botão “Novo usuário”."
    pageReportTitle="usuários">

    <ng-template #headerTpl>
      <tr>
        <th>Login</th>
        <th>Permissões</th>
        <th style="width: 84px; text-align: center">Editar</th>
      </tr>
    </ng-template>

    <ng-template #bodyTpl let-user>
      <tr [class.ac-row-active]="editingUser?.login === user.login">
        <td class="ac-login-cell">{{ user.login }}</td>
        <td>
          <span class="ac-tag" *ngFor="let role of user.roles" [attr.data-role]="role">
            {{ getRoleLabel(role) }}
          </span>
        </td>
        <td style="text-align: center">
          <pk-button pkType="edit" pkSize="sm" [pkIconOnly]="true"
                     pkTooltip="Editar permissões" (clicked)="selectUserToEdit(user)"/>
        </td>
      </tr>
    </ng-template>
  </pk-table>
</div>

<!-- MODAL: criar / editar usuário -->
<pk-dialog
  [visible]="showDialog"
  (visibleChange)="onDialogVisibleChange($event)"
  [header]="editingUser ? 'Editar usuário' : 'Novo usuário'"
  width="460px">

  <div pkDialogContent>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="pk-form-section">

      <div class="edit-banner" *ngIf="editingUser">
        <i class="pi pi-info-circle"></i>
        Editando <strong>{{ editingUser.login }}</strong> — apenas as permissões podem ser alteradas.
      </div>

      <div class="ac-fields">
        <pk-input formControlName="login" label="Login" [pkRequired]="true"
                  icon="pi pi-user" placeholder="login.usuario"/>

        <ng-container *ngIf="!editingUser">
          <pk-input formControlName="email" label="E-mail" type="email" [pkRequired]="true"
                    icon="pi pi-envelope" placeholder="usuario@empresa.com"/>

          <pk-password formControlName="password" label="Senha" [pkRequired]="true"
                       [feedback]="true" placeholder="Mínimo 8 caracteres"/>

          <pk-password formControlName="confirmPassword" label="Confirmar senha" [pkRequired]="true"
                       placeholder="Repita a senha"/>
        </ng-container>

        <pk-multiselect formControlName="roles" label="Permissões" [pkRequired]="true"
                        [options]="availableRoles" optionLabel="label" optionValue="value"
                        placeholder="Selecione as permissões"/>
      </div>

      <button type="submit" hidden></button>
    </form>
  </div>

  <div pkDialogFooter class="pk-dialog-footer">
    <pk-button pkType="cancel" pkSize="sm" (clicked)="closeDialog()"/>
    <pk-button pkType="save" pkSize="sm"
               [pkLabel]="editingUser ? 'Atualizar' : 'Salvar'"
               [pkLoading]="isSubmitting" (clicked)="onSubmit()"/>
  </div>
</pk-dialog>
