<div class="container">
  <div class="header">
    <h1>Gerador de Links Seguros</h1>
    <p>Compartilhe segredos de forma segura e temporária.</p>
  </div>

  <textarea [(ngModel)]="content" placeholder="Digite ou cole o conteúdo do arquivo de segredos aqui..." maxlength="4096"></textarea>
  <button (click)="create()" [disabled]="loading || !content.trim()">
    {{ loading ? 'Gerando...' : 'Gerar Link Seguro' }}
  </button>

  <div *ngIf="secretUrl" class="result">
    <input [value]="secretUrl" readonly>
    <button (click)="copy()" [disabled]="!secretUrl">
      Copiar Link
    </button>
    <p class="warn">
      <strong>Atenção:</strong> O link gerado é válido por apenas 24 horas e só pode ser acessado uma vez. Certifique-se de compartilhá-lo com a pessoa certa e de que ela saiba da importância de manter o link seguro.
    </p>
  </div>
</div>
