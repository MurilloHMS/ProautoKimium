<div class="pk-container">
  <!-- Card principal -->
  <div class="pk-card">

    <div class="pk-card-header">
      <div class="pk-card-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div>
        <h2 class="pk-card-title">Gerador de Links Seguros</h2>
        <p class="pk-card-desc">Compartilhe segredos de forma segura e temporária</p>
      </div>
    </div>

    <div class="pk-divider"></div>

    <div class="pk-field-group">
      <label class="pk-label">Conteúdo do segredo</label>
      <div class="pk-textarea-wrapper">
        <textarea
          [(ngModel)]="content"
          placeholder="Digite ou cole o conteúdo confidencial aqui..."
          maxlength="4096"
          class="pk-textarea"
        ></textarea>
        <span class="pk-char-hint">máx. 4096 caracteres</span>
      </div>
    </div>

    <button
      class="pk-btn pk-btn-primary"
      (click)="create()"
      [disabled]="loading || !content.trim()"
    >
      <span *ngIf="!loading" class="pk-btn-content">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        Gerar Link Seguro
      </span>
      <span *ngIf="loading" class="pk-btn-content pk-loading-text">
        <span class="pk-spinner"></span>
        Gerando...
      </span>
    </button>

    <div *ngIf="secretUrl" class="pk-result">
      <div class="pk-result-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="pk-success-icon">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Link gerado com sucesso
      </div>

      <div class="pk-url-row">
        <input class="pk-url-input" [value]="secretUrl" readonly>
        <button class="pk-btn pk-btn-outline pk-btn-copy" (click)="copy()" [disabled]="!secretUrl">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copiar
        </button>
      </div>

      <div class="pk-alert pk-alert-warn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <span>
          <strong>Atenção:</strong> O link é válido por <strong>24 horas</strong> e só pode ser acessado <strong>uma vez</strong>.
          Compartilhe apenas com a pessoa autorizada.
        </span>
      </div>
    </div>

  </div>
</div>
