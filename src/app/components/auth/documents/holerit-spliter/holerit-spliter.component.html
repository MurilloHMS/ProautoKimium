<div class="painel-wrapper">
  <p-toast position="bottom-right"></p-toast>

  <div class="page-header">
    <div class="header-left">
      <div class="header-icon">
        <i class="pi pi-file-pdf"></i>
      </div>
      <div>
        <h1 class="page-title">Separador de Holerites</h1>
        <p class="page-subtitle">Faça upload do PDF, renomeie cada página e baixe os arquivos separados</p>
      </div>
    </div>
  </div>

  <div class="section-card upload-card" [class.has-file]="selectedFile">

    <div class="section-label">
      <i class="pi pi-upload"></i>
      <span>Selecionar arquivo</span>
    </div>

    <pk-fileUpload
      mode="both"
      dropTitle="Arraste o PDF aqui"
      chooseLabel="Selecionar PDF"
      chooseType="upload"
      accept="application/pdf"
      [maxFileSize]="10000000"
      fileIcon="pi pi-file-pdf"
      (filesSelected)="onFileSelect($event)"
      (cleared)="onClear()"
      [loading]="isUploading"
      loadingTitle="Processando PDF..."
      loadingSubtitle="Extraindo páginas, aguarde"
    >
    </pk-fileUpload>

  <div class="section-card pages-card" *ngIf="pages.length > 0 && !isUploading" @fadeIn>

    <div class="section-label">
      <i class="pi pi-list"></i>
      <span>Renomear páginas</span>
      <span class="page-count-badge">{{ pages.length }} página{{ pages.length > 1 ? 's' : '' }}</span>
      <span class="upload-id">
        <i class="pi pi-hashtag"></i>{{ uploadId }}
      </span>
    </div>

    <div class="pages-grid">
      <div
        class="page-item"
        *ngFor="let page of pages; let i = index"
        [style.animation-delay]="i * 40 + 'ms'">

        <div class="page-number">
          <span>{{ i + 1 }}</span>
        </div>

        <div class="page-input-group">
          <label [for]="'page-' + i" class="page-original-hint">
            <i class="pi pi-file"></i> Original: {{ getOriginalName(i) }}
          </label>
          <input
            pInputText
            [id]="'page-' + i"
            type="text"
            [(ngModel)]="page.name"
            placeholder="Nome do arquivo da página {{ i + 1 }}"
            class="page-name-input"
          />
        </div>

        <pk-button
          pkType="refresh"
          pTooltip="Restaurar nome original"
          tooltipPosition="right"
          (click)="restoreOriginalName(i)">
        </pk-button>
      </div>
    </div>

    <div class="pages-footer">
      <div class="footer-info">
        <i class="pi pi-info-circle"></i>
        <span>Os PDFs serão baixados em um arquivo <strong>.zip</strong></span>
      </div>
      <div class="footer-actions">
        <pk-button
          pkLabel="Resetar"
          pkType="refresh"
          (clicked)="resetForm()"
        />
        <pk-button
          pkLabel="Baixar PDFs separados"
          pkType="download"
          (clicked)="saveRenamedPages()"
          [pkLoading]="isSaving"
          [pkDisabled]="isSaving">
        </pk-button>
      </div>
    </div>
  </div>

</div>
</div>
