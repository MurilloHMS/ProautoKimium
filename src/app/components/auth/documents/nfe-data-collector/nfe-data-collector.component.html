<div class="d-flex justify-content-center align-items-center min-vh-100 bg-light px-3">
  <div class="card shadow-lg rounded-4 p-5 w-100" style="max-width: 900px;">
    <h2 class="text-center fw-bold text-primary mb-4 d-flex justify-content-center align-items-center gap-2">
      <i class="pi pi-file"></i> Processador de XML
    </h2>
    <div class="d-flex justify-content-center align-items-center p-3 bg-light px-3">
      <div class="d-flex align-items-center">
        <span class="me-2">Coletar dados da NFe</span>
        <p-toggleswitch [(ngModel)]="collectNfe" (onChange)="onToggle('nfe')">
          <ng-template #handle let-checked="checked">
            <i [ngClass]="['pi', checked ? 'pi-check' : 'pi-times']"></i>
          </ng-template>
        </p-toggleswitch>
      </div>

      <div class="d-flex align-items-center ms-4">
        <span class="me-2">Coletar dados do ICMS</span>
        <p-toggleswitch [(ngModel)]="collectIcms" (onChange)="onToggle('icms')">
          <ng-template #handle let-checked="checked">
            <i [ngClass]="['pi', checked ? 'pi-check' : 'pi-times']"></i>
          </ng-template>
        </p-toggleswitch>
      </div>
    </div>


    <p-toast></p-toast>

    <p-fileupload
      name="myfile[]"
      [multiple]="true"
      accept=".xml"
      maxFileSize="1000000"
      (onSelect)="onSelectedFiles($event)"
      [auto]="false"
      class="w-100"
    >

      <ng-template
        #header
        let-files
        let-chooseCallback="chooseCallback"
        let-clearCallback="clearCallback"
        let-uploadCallback="uploadCallback"
      >
        <div class="d-flex flex-wrap justify-content-between align-items-center w-100 border-bottom pb-3 mb-3">
          <div class="btn-group gap-2">
            <p-button
              (click)="choose($event, chooseCallback)"
              icon="pi pi-images"
              [rounded]="true"
              [outlined]="true"
              severity="secondary"
              tooltip="Escolher arquivos"
            ></p-button>
            <p-button
              (click)="uploadFiles()"
              icon="pi pi-cloud-upload"
              [rounded]="true"
              [outlined]="true"
              severity="success"
              [disabled]="!files || files.length === 0"
              tooltip="Enviar arquivos"
            ></p-button>
            <p-button
              (click)="clearCallback()"
              icon="pi pi-times"
              [rounded]="true"
              [outlined]="true"
              severity="danger"
              [disabled]="!files || files.length === 0"
              tooltip="Limpar"
            ></p-button>
          </div>

          <div class="flex-grow-1 ms-3">
            <p-progressbar
              [value]="totalSizePercent"
              [showValue]="false"
              class="h-2"
            ></p-progressbar>
            <small class="text-muted d-block mt-1">
              {{ totalSize }}B / 100MB ({{ totalSizePercent | number:'1.0-2' }}%)
            </small>
          </div>
        </div>
      </ng-template>


      <ng-template
        #content
        let-files
        let-uploadedFiles="uploadedFiles"
        let-removeFileCallback="removeFileCallback"
        let-removeUploadedFileCallback="removeUploadedFileCallback"
      >
        <div class="d-flex flex-column gap-5 pt-3">

          <div *ngIf="files?.length > 0">
            <h5 class="fw-semibold text-secondary mb-3">Pendentes</h5>
            <div class="row g-4">
              <div
                *ngFor="let file of files; let i = index"
                class="col-12 col-sm-6 col-md-4"
              >
                <div class="card h-100 text-center p-3 border shadow-sm">
                  <img
                    role="presentation"
                    [alt]="file.name"
                    src="assets/images/xml-file.png"
                    class="img-fluid rounded mb-3"
                    style="max-height: 50px; max-width: 50px; object-fit: fill;"
                  />
                  <h6 class="text-truncate">{{ file.name }}</h6>
                  <p class="text-muted small mb-2">{{ formatSize(file.size) }}</p>
                  <p-badge value="Pendente" severity="warn"></p-badge>
                  <div class="mt-3">
                    <p-button
                      icon="pi pi-times"
                      (click)="onRemoveTemplatingFile($event, file, removeFileCallback, index)"
                      [outlined]="true"
                      [rounded]="true"
                      severity="danger"
                    ></p-button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div *ngIf="uploadedFiles?.length > 0">
            <h5 class="fw-semibold text-secondary mb-3">Concluídos</h5>
            <div class="row g-4">
              <div
                *ngFor="let file of uploadedFiles; let i = index"
                class="col-12 col-sm-6 col-md-4"
              >
                <div class="card h-100 text-center p-3 border shadow-sm">
                  <img
                    role="presentation"
                    [alt]="file.name"
                    src="assets/images/xml-file.png"
                    class="img-fluid rounded mb-3"
                    style="max-height: 50px; max-width: 50px; object-fit: fill;"
                  />
                  <h6 class="text-truncate">{{ file.name }}</h6>
                  <p class="text-muted small mb-2">{{ formatSize(file.size) }}</p>
                  <p-badge value="Concluído" severity="success"></p-badge>
                  <div class="mt-3">
                    <p-button
                      icon="pi pi-times"
                      (click)="removeUploadedFileCallback(i)"
                      [outlined]="true"
                      [rounded]="true"
                      severity="danger"
                    ></p-button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </ng-template>


      <ng-template #empty>
        <div class="d-flex flex-column align-items-center justify-content-center py-5 text-muted">
          <i
            class="pi pi-cloud-upload border border-2 border-secondary rounded-circle p-4 fs-1 mb-3"
          ></i>
          <p class="mb-0">Arraste seus arquivos aqui ou clique em <b>Escolher</b>.</p>
        </div>
      </ng-template>
    </p-fileupload>
  </div>
</div>
