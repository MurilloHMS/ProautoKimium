<section class="docs-page">
  <header class="docs-header">
    <h1>Documentos</h1>
    <p>Acesse os arquivos e materiais da empresa por categoria.</p>
  </header>

  <div class="docs-grid">
    @for (cat of categorias; track cat.titulo) {
      <button type="button" class="doc-card" (click)="abrir(cat)">
        <span class="doc-card__icon"><i [class]="cat.icon"></i></span>
        <span class="doc-card__body">
          <span class="doc-card__title">{{ cat.titulo }}</span>
          <span class="doc-card__desc">{{ cat.descricao }}</span>
        </span>
        <i class="pi pi-chevron-right doc-card__arrow"></i>
      </button>
    }
  </div>
</section>
