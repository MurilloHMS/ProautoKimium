<div class="container">
  <div class="screen">
    <div class="screen_content">
      <form [formGroup]="form" (ngSubmit)="login()" class="login">

        <div class="login_field">
          <i class="login_icon fas fa-user"></i>
          <input type="text" formControlName="username" class="login_input" placeholder="Usuário / Email" />
        </div>

        <div class="login_field pt-2">
          <i class="login_icon fas fa-lock"></i>
          <input type="password" formControlName="password" class="login_input" placeholder="Senha" />
        </div>
        @if (errorMessage) {
          <small class="error_message">{{ errorMessage }}</small>
        }
        <div class="button_wrapper">
          <p-button label="Login" icon="fas fa-chevron-right" type="submit" [disabled]="form.invalid" [loading]="loading" styleClass="button login_submit" ></p-button>
        </div>
      </form>
    </div>

    <div class="screen_background">
      <span class="screen_background_shape screen_background_shape4"></span>
      <span class="screen_background_shape screen_background_shape3"></span>
      <span class="screen_background_shape screen_background_shape2"></span>
      <span class="screen_background_shape screen_background_shape1"></span>
    </div>
  </div>
</div>
