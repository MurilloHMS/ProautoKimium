<div class="pk-container">
  <!-- Card -->
  <div class="pk-card">

    <!-- Loading state -->
    <div *ngIf="loading" class="pk-state pk-state-loading">
      <div class="pk-spinner-lg"></div>
      <p>Carregando segredo...</p>
    </div>

    <!-- Conteúdo do segredo -->
    <div *ngIf="content && !loading">
      <div class="pk-card-header">
        <div class="pk-card-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
          </svg>
        </div>
        <div>
          <h2 class="pk-card-title">Segredo Seguro</h2>
          <p class="pk-card-desc">Acesse e copie o conteúdo antes que seja destruído</p>
        </div>
      </div>

      <div class="pk-divider"></div>

      <div class="pk-secret-block">
        <div class="pk-secret-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Conteúdo confidencial
        </div>
        <pre class="pk-secret-content">{{ content }}</pre>
      </div>

      <button class="pk-btn pk-btn-primary" (click)="copy()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Copiar segredo
      </button>

      <div class="pk-alert pk-alert-danger">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <span>
          Este segredo é <strong>temporário</strong> e será destruído após a visualização.
          Copie agora — não será possível recuperá-lo.
        </span>
      </div>
    </div>

    <!-- Erro -->
    <div *ngIf="errorMsg" class="pk-state pk-state-error">
      <div class="pk-state-icon pk-state-icon--error">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <p class="pk-state-title">Segredo indisponível</p>
      <p class="pk-state-msg">{{ errorMsg }}</p>
    </div>

  </div>
</div>
