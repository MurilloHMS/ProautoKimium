<section class="faq-section">
  <div class="container">
    <div class="section-title text-center">
      <h2>FAQ - Perguntas Frequentes</h2>
      <p>Aqui você encontrará respostas para algumas das dúvidas mais comuns sobre a Proauto Kimium e nossos produtos químicos de qualidade.</p>
    </div>

    <p-accordion [value]="0">
      @for (item of faqs; track item) {
        <p-accordionpanel [value]="item.value">
          <p-accordion-header>
            <h3>{{ item.title }}</h3>
          </p-accordion-header>
          <p-accordion-content>
            <p>{{ item.body }}</p>
          </p-accordion-content>
        </p-accordionpanel>
      }
    </p-accordion>
  </div>
</section>
