<div class="certificate-container">
  <!-- Header com Ícone -->
  <div class="header-section">
    <div class="success-icon">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
    </div>
    <h1 class="title">Parabéns!</h1>
    <p class="subtitle">Você está a um passo de conquistar seu certificado</p>
  </div>

  <!-- Badge do Treinamento -->
  <div class="training-badge">
    <div class="badge-icon">📋</div>
    <div class="badge-text">
      <span class="badge-label">Treinamento</span>
      <strong>Gestão, Higiene e Limpeza</strong>
    </div>
  </div>

  <!-- Vídeo -->
  <div class="video-wrapper">
    <iframe width="100%" height="200"
            src="https://www.youtube.com/embed/l4ESEUUkqUQ"
            title="YouTube video player"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen>
    </iframe>
  </div>

  <!-- Instruções -->
  <div class="instructions">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="16" x2="12" y2="12"></line>
      <line x1="12" y1="8" x2="12.01" y2="8"></line>
    </svg>
    <span>Preencha os dados abaixo para receber seu certificado</span>
  </div>

  <!-- Formulário -->
  <form [formGroup]="form" class="form-section">
    <div class="form-group">
      <label class="form-label">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        Nome completo
      </label>
      <input type="text" 
             class="form-input" 
             formControlName="nome"
             placeholder="Digite seu nome completo">
    </div>

    <div class="form-group">
      <label class="form-label">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
          <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
        E-mail
      </label>
      <input type="email" 
             class="form-input" 
             formControlName="email"
             placeholder="seu@email.com">
    </div>

    <div class="form-group">
      <label class="form-label">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
        </svg>
        WhatsApp
      </label>
      <input type="tel" 
             pattern="[0-9]*" 
             maxlength="15" 
             inputmode="numeric" 
             class="form-input" 
             formControlName="contato"
             placeholder="(00) 00000-0000"
             mask="(00) 00000-0000"
             [dropSpecialCharacters]="true"
             (keypress)="$event.charCode >= 48 && $event.charCode <= 57">
    </div>
  </form>

  <!-- Botão -->
  <button class="btn-generate" 
          [disabled]="form.invalid" 
          (click)="gerarCertificado()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
      <polyline points="14 2 14 8 20 8"></polyline>
      <line x1="12" y1="18" x2="12" y2="12"></line>
      <line x1="9" y1="15" x2="15" y2="15"></line>
    </svg>
    Gerar Certificado
  </button>

  <!-- Footer -->
  <div class="footer-note">
    <p>🔒 Seus dados estão seguros e serão usados apenas para emissão do certificado</p>
  </div>
</div>
