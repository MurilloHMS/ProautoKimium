<section class="login-container">

  <div class="bg-grid" aria-hidden="true">
    <div class="bg-grid__line" *ngFor="let i of [1,2,3,4,5,6,7,8]"></div>
  </div>

  <div class="accent accent--tl" aria-hidden="trueP"></div>
  <div class="accent accent--br" aria-hidden="true"></div>

  <div class="login-card">

    <div class="card-stripe"></div>

    <div class="card-body">
    <a routerLink="" class="back_to_home">Voltar</a>
      <div class="card-header">
        <div class="card-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <h1 class="card-title">Área do Cliente</h1>
        <p class="card-subtitle">Entre com suas credenciais para acessar sua conta</p>
      </div>
      <form class="login-form" (ngSubmit)="login()" novalidate>

        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
            </span>
            <input
              type="email"
              id="email"
              formControlName="email"
              class="form-input"
              placeholder="seu@email.com"
              autocomplete="email"
            />
          </div>
        </div>

        <div class="form-group">
          <div class="label-row">
            <label class="form-label" for="password">Senha</label>
            <a href="#" class="forgot-link">Esqueceu?</a>
          </div>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="password"
              formControlName="password"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </div>
        </div>

        @if (errorMessage) {
          <div class="error-banner" role="alert">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span class="error-message">{{ errorMessage }}</span>
          </div>
        }

        <button type="submit" class="submit-button" [disabled]="form.invalid || loading">
          <span class="submit-text">{{ loading ? 'Entrando...' : 'Entrar' }}</span>
          <span class="submit-arrow">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </span>
        </button>

      </form>

    </div>
  </div>

  <!-- Footer note -->
  <p class="login-footer">Acesso restrito a clientes cadastrados</p>

</section>
