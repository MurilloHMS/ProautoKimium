<div class="pk-table-card">
  <p-table
    #dt
    [value]="data()"
    [paginator]="true"
    [rows]="rows()"
    [rowsPerPageOptions]="rowsOptions()"
    [loading]="loading()"
    [responsiveLayout]="'scroll'"
    [globalFilterFields]="filterFields()"
    [rowHover]="true"
    styleClass="pk-table"
    size="small">

    <ng-template pTemplate="caption">
      <div class="pk-table-caption">
        <span class="pk-table-caption__count">
          <strong>{{ data().length }}</strong> {{ totalLabel() }}
        </span>
        <span class="pk-table-caption__search">
          <pk-input
            type="text"
            icon="pi pi-search"
            [placeholder]="searchPlaceholder()"
            (input)="dt.filterGlobal($any($event.target).value, 'contains')" />
        </span>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <ng-container *ngTemplateOutlet="headerTpl"></ng-container>
    </ng-template>

    <ng-template pTemplate="body" let-rowData>
      <ng-container *ngTemplateOutlet="bodyTpl; context: { $implicit: rowData }"></ng-container>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td [attr.colspan]="100">
          <div class="pk-empty-state">
            <i [class]="emptyIcon() + ' pk-empty-state__icon'"></i>
            <p class="pk-empty-state__title">{{ emptyTitle() }}</p>
            <p class="pk-empty-state__subtitle" *ngIf="emptySubtitle()">{{ emptySubtitle() }}</p>
          </div>
        </td>
      </tr>
    </ng-template>

  </p-table>
</div>
