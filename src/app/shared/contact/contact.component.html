<p-toast></p-toast>

<div class="contato-dialog">

  <div class="contato-rapido">
    <a href="https://wa.me/05511983583564" target="_blank" class="contato-item">
      <i class="fab fa-whatsapp"></i>
      <span>(11) 9 8358-3564</span>
    </a>
    <a href="https://wa.me/05511957782766" target="_blank" class="contato-item">
      <i class="fab fa-whatsapp"></i>
      <span>(11) 9 5778-2766</span>
    </a>
    <a href="mailto:sac@proautokimium.com.br" class="contato-item">
      <i class="fas fa-envelope"></i>
      <span>sac@proautokimium.com.br</span>
    </a>
  </div>

  <form [formGroup]="form" class="form-compacto">
    <div class="form-row">
      <div class="form-field">
        <input
          pInputText
          formControlName="name"
          placeholder="Nome completo"
          class="input-compact"
        />
      </div>
      <div class="form-field">
        <input
          pInputText
          formControlName="businessName"
          placeholder="Nome da empresa"
          class="input-compact"
        />
      </div>
    </div>

    <div class="form-row">
      <div class="form-field">
        <input
          pInputText
          formControlName="email"
          type="email"
          placeholder="E-mail"
          class="input-compact"
        />
      </div>
      <div class="form-field">
        <p-select
          [options]="tiposContato"
          [(ngModel)]="tipoSelecionado"
          optionLabel="label"
          formControlName="contactType"
          placeholder="Motivo do contato"
          styleClass="select-compact"
          appendTo="body"
        />
      </div>
    </div>

    @if (form.value.contactType?.value === "Outros") {
      <div class="form-field full">
        <input
          pInputText
          formControlName="other"
          placeholder="Especifique o motivo"
          class="input-compact"
        />
      </div>
    }

    <div class="form-field full">
      <textarea
        pInputTextarea
        rows="3"
        formControlName="message"
        placeholder="Sua mensagem..."
        class="textarea-compact"
      ></textarea>
    </div>

    <button
      class="btn-enviar"
      pButton
      type="button"
      (click)="submit()"
      [disabled]="isLoading"
    >
      @if (isLoading) {
        <i class="pi pi-spin pi-spinner"></i>
        <span>Enviando...</span>
      } @else {
        <i class="fas fa-paper-plane"></i>
        <span>Enviar Mensagem</span>
      }
    </button>
  </form>

  <div class="footer-social">
    <span>Siga-nos:</span>
    <div class="social-icons">
      <a href="#"><i class="fab fa-facebook-f"></i></a>
      <a href="https://www.instagram.com/proautokimium/" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://br.linkedin.com/company/proauto-kimium" target="_blank"><i class="fab fa-linkedin-in"></i></a>
    </div>
  </div>

</div>
