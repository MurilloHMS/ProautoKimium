<div class="nf-page">
  <div class="nf-content">

    <div class="nf-illustration">
      <span class="nf-digit">4</span>
      <div class="nf-icon-wrapper">
        <i class="pi pi-compass nf-icon"></i>
      </div>
      <span class="nf-digit">4</span>
    </div>

    <h1 class="nf-title">Página não encontrada</h1>
    <p class="nf-subtitle">

    <div class="nf-actions">

        pkLabel="Voltar"
        (clicked)="goBack()" />

      <pk-button
        pkType="home"
        pkLabel="Ir para o início"
        (clicked)="goHome()" />

  </div>
</div>
